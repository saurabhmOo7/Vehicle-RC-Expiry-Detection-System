<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="subpage">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <p class="eyebrow mb-1">Violation Records</p>
                <h1 class="text-white">Generated Challans</h1>
            </div>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-light">Back to Dashboard</a>
        </div>

        <div class="panel-card">
            <div class="table-responsive">
                <table class="table table-dark table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Vehicle</th>
                            <th>Owner</th>
                            <th>Violation</th>
                            <th>Fine</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="challan-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
